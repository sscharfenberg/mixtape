# /etc/fail2ban/filter.d/mixtape-auth.conf
#
# Parses the application's dedicated auth-failure log
# (storage/logs/auth.log, written by App\Listeners\LogAuthenticationFailures).
#
# Why not the nginx access log: it cannot tell a failed login from a successful
# one. Fortify redirects back to the form either way, so both are POST /login
# → 302, and a jail built on that bans people for logging in correctly.
#
# The line format is fixed by the listener and asserted by
# tests/Feature/Auth/AuthFailureLogTest.php, which keeps a mirror of the
# expressions below. If you change one, change both — a filter that quietly
# stops matching is indistinguishable from a quiet network.
#
# Matched lines look like:
#   [2026-07-19 07:18:02] production.WARNING: login.failed ip=203.0.113.9 username="ada" user_id=- route="login.store" ua="curl/8.7.1"
#   [2026-07-19 07:18:02] production.WARNING: two_factor.failed ip=203.0.113.9 user_id=019f… route="two-factor.login.store" ua="-"
#
# The submitted password is deliberately absent. Failed logins carry working
# credentials more often than you would think (wrong username, right password),
# so logging it would build a plaintext credential store that outlives the
# account and lands in every backup. `ua` is the automation signal instead.
#
# `ip=` is the first field on purpose: everything after it derives from
# attacker-supplied input. The listener strips control characters and quotes
# what it writes, so a username cannot forge a line and steer a ban at a
# third party — but the anchoring here is the second line of that defence.

[Definition]

# NOTE: fail2ban removes the timestamp from the line before applying failregex,
# so these patterns must match what is LEFT once datepattern below has eaten the
# date — i.e. they start at the channel/level, not at "[2026-…".
#
# Writing the obvious `^\[[^\]]+\] \w+\.WARNING: …` instead produces the most
# confusing possible result: `fail2ban-regex` reports the datepattern hitting
# every line while matching none of them, because the two are being applied to
# different strings.
#
# The leading `\]?\s*` absorbs the closing bracket, which survives because
# datepattern stops at the seconds. Being tolerant here means the filter keeps
# working if the date format is ever tightened to include the bracket.

failregex = ^\]?\s*\w+\.\w+:\s+login\.failed\s+ip=<HOST>\b
            ^\]?\s*\w+\.\w+:\s+two_factor\.failed\s+ip=<HOST>\b

ignoreregex =

# Laravel's Monolog line formatter, e.g. [2026-07-19 07:18:02] — not ISO 8601.
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S
