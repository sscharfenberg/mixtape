# /etc/nginx/conf.d/mixtape-limits.conf
#
# Rate-limit and connection-limit zones for the prod site.
#
# These MUST live in the http context (i.e. conf.d/, which nginx.conf includes
# at line 60) — `limit_req_zone` and `limit_conn_zone` are invalid inside a
# server{} block. The vhost only references them via limit_req / limit_conn.
#
# Defining a zone costs nothing until a server block uses it, so the dev vhost
# is unaffected by this file existing.

# 10m of shared memory tracks roughly 160k unique IPs — far more than this box
# will ever see.
limit_req_zone  $binary_remote_addr zone=mx_dynamic:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=mx_conn:10m;

# 429 rather than nginx's default 503: 503 means "server unavailable" and would
# be indistinguishable from Laravel's maintenance page in the logs, and it also
# tells well-behaved clients the wrong thing. 429 says "you, specifically, are
# going too fast".
limit_req_status  429;
limit_conn_status 429;
