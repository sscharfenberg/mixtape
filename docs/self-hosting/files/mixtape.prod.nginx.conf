# /etc/nginx/sites-available/mixtape.prod
#
# MixTape v2 — production vhost. Mirrors mixtape.dev, but:
#   - owns the `default_server` flag (must be REMOVED from mixtape.dev at the same time)
#   - talks to the isolated `mixtape-prod` php-fpm pool
#   - ships the FULL CSP (dev only runs the resource-agnostic hardening subset,
#     because Vite HMR loads scripts + a wss from the :5174 vhost)
#
# TEMPLATE. Replace <your-domain> throughout before installing.
# The "managed by Certbot" if-blocks duplicate the location / redirect below —
# harmless, and certbot re-adds them on renewal, so leave them alone.
# Step 4 (certbot --nginx) rewrites the ssl_certificate* lines and the redirect.

server {
    if ($host = <your-domain>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = <your-domain>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

                                    # HTTP -> HTTPS (+ ACME path kept)
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name <your-domain>;

    location /.well-known/acme-challenge/ { allow all; root /var/www/html; }
    location /                             { return 301 https://$host$request_uri; }




}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name <your-domain>;

    root  /var/www/mixtape.prod/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/<your-domain>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem; # managed by Certbot

    access_log /var/log/nginx/mixtape.prod.access.log;
    error_log  /var/log/nginx/mixtape.prod.error.log;

    # --- Abuse limits -----------------------------------------------------
    # Zones are defined in conf.d/mixtape-limits.conf (http context).
    #
    # Concurrent connections per IP. A browser opens ~6 per host, so 20 leaves
    # room for several tabs while stopping a scraper from opening hundreds in
    # parallel — which is how a home uplink actually gets saturated.
    limit_conn mx_conn 20;

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        # 30r/s with burst 60 applies to DYNAMIC requests only — static assets
        # under /build are served straight from disk and cost nothing. A page
        # load is one PHP request, so a real user never comes close; a scanner
        # walking paths at machine speed gets 429s. `nodelay` serves the burst
        # immediately rather than queueing it, so legitimate traffic never feels
        # artificially slow.
        limit_req zone=mx_dynamic burst=60 nodelay;

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/mixtape-prod.sock;
        # Large media downloads stream through PHP; keep this in step with the
        # pool's request_terminate_timeout (300s).
        fastcgi_read_timeout 300s;
    }

    location ~ /\.(?!well-known).* { deny all; }

    # --- Security headers -------------------------------------------------
    # ALL header directives live in this server{} block on purpose: a single
    # add_header inside any location{} would drop every inherited header for
    # that location (nginx's header-inheritance trap).
    add_header X-Content-Type-Options nosniff                     always;
    add_header X-Frame-Options        SAMEORIGIN                  always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Full CSP — prod serves built assets from 'self' with no dev server.
    #   script-src 'unsafe-inline' : required by the inline pre-paint theme script
    #                                (nginx cannot emit per-request nonces)
    #   style-src  'unsafe-inline' : required by Vue's v-bind() inline styles
    # Both still block external-origin loads. Follow-up worth doing later: move
    # CSP into Laravel middleware with per-request nonces (spatie/laravel-csp)
    # to drop script-src 'unsafe-inline'.
    #
    # NOTE: when the vidstack player lands, media-src likely needs `blob:`
    # (and possibly worker-src 'self' blob:). Re-test playback then.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;

    client_max_body_size 32M;



}
