# /etc/fail2ban/filter.d/mixtape-auth.conf
#
# Parses the application's dedicated auth-failure log
# (storage/logs/auth.log, written by App\Listeners\LogAuthenticationFailures).
#
# Why not the nginx access log: it cannot tell a failed login from a successful
# one. Fortify redirects back to the form either way, so both are POST /login
# → 302, and a jail built on that bans people for logging in correctly.
#
# The line format is fixed by the listener and asserted by
# tests/Feature/Auth/AuthFailureLogTest.php, which keeps a mirror of the
# expressions below. If you change one, change both — a filter that quietly
# stops matching is indistinguishable from a quiet network.
#
# Matched lines look like:
#   [2026-07-19 07:18:02] production.WARNING: login.failed ip=203.0.113.9 username="ada" user_id=- route="login.store"
#   [2026-07-19 07:18:02] production.WARNING: two_factor.failed ip=203.0.113.9 user_id=019f… route="two-factor.login.store"
#
# `ip=` is the first field on purpose: everything after it derives from
# attacker-supplied input. The listener strips control characters and quotes
# what it writes, so a username cannot forge a line and steer a ban at a
# third party — but the anchoring here is the second line of that defence.

[Definition]

failregex = ^\s*\[[^\]]+\] \w+\.WARNING: login\.failed ip=<HOST>\b
            ^\s*\[[^\]]+\] \w+\.WARNING: two_factor\.failed ip=<HOST>\b

ignoreregex =

# Laravel's Monolog line formatter, e.g. [2026-07-19 07:18:02] — not ISO 8601.
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S
