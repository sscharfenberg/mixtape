; /etc/php/8.4/fpm/pool.d/mixtape-prod.conf
;
; Isolated php-fpm pool for the production site. The dev site keeps the default
; [www] pool (/run/php/php8.4-fpm.sock) — a prod worker crash or slow-log flood
; must not touch dev, and vice versa.
;
; Sizing below is deliberately modest — this is a family-scale app, and leaving
; headroom matters more than peak concurrency. Raise pm.max_children only if you
; actually see the pool saturate; each child can use up to memory_limit.

[mixtape-prod]

user  = www-data
group = www-data

listen       = /run/php/mixtape-prod.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 12
pm.start_servers     = 4
pm.min_spare_servers = 3
pm.max_spare_servers = 6
pm.max_requests      = 500        ; recycle workers; cheap insurance against leaks

; --- Logging ------------------------------------------------------------
; Own log files so prod noise is separable from dev's.
php_admin_value[error_log] = /var/log/php/mixtape-prod.error.log
php_admin_flag[log_errors] = on
catch_workers_output       = yes
decorate_workers_output    = no

slowlog                       = /var/log/php/mixtape-prod.slow.log
request_slowlog_timeout       = 5s
; Streaming a large mp3 download through PHP can legitimately run long; keep
; this in step with the vhost's fastcgi_read_timeout.
request_terminate_timeout     = 300s

; --- Hardening ----------------------------------------------------------
security.limit_extensions = .php
php_admin_flag[expose_php]              = off
php_admin_flag[display_errors]          = off
php_admin_flag[allow_url_fopen]         = on   ; Laravel/Composer rely on this
php_admin_value[memory_limit]           = 256M
php_admin_value[upload_max_filesize]    = 32M
php_admin_value[post_max_size]          = 32M

; --- Sessions -----------------------------------------------------------
; Laravel uses the `database` session driver, so PHP's own session dir is
; unused — but point it somewhere pool-private anyway rather than sharing
; /var/lib/php/sessions with the dev pool.
php_admin_value[session.save_path] = /var/lib/php/sessions/mixtape-prod
