# Append to /etc/fail2ban/jail.local — the web-login jail.
#
# Pairs with filter.d/mixtape-auth.conf and the app's `auth` log channel.
# Only the production site gets a jail; a LAN-only dev site has no attack
# surface worth banning for, and banning yourself off your own LAN while
# developing is a genuinely annoying way to find that out.

[mixtape-auth]

enabled  = true
filter   = mixtape-auth
logpath  = /var/www/mixtape.prod/storage/logs/auth.log

# REQUIRED, and the easiest thing here to get wrong.
#
# A hardened jail.local usually sets `backend = systemd` in [DEFAULT] so the
# sshd jail reads the journal. This jail reads a *file*, and the setting is
# inherited — so without this line fail2ban starts the jail, reports it as
# healthy, and matches nothing for the rest of time. Check your [DEFAULT]
# before assuming you can drop this.
backend = auto

# The port to ban on. `banaction` is usually already set in [DEFAULT]
# (nftables-multiport on an nftables host); leave it there rather than
# repeating it per jail, so the mechanism changes in one place.
port = http,https

# The application already rate-limits login to 5/min per username+IP, so anyone
# reaching 10 failures inside findtime is deliberately grinding rather than
# fumbling a password. Keep maxretry comfortably above the app's own limit:
# below it, the app's 429s would do the throttling and this jail would only ever
# fire on traffic the app had already refused. Note this overrides a stricter
# [DEFAULT] maxretry (4 is a sensible default for sshd, too twitchy for a login
# form that humans use).
maxretry = 10

# findtime / bantime / ignoreip are inherited from [DEFAULT].
#
# ⚠ A LAN CIDR in ignoreip is NOT enough, and believing otherwise is the way
# you lock your own household out. When someone inside the LAN opens the public
# URL, the router hairpins the connection (NAT loopback) and the web server
# sees your *WAN* address, not the client's LAN address — so every device in
# the house shares one external-looking IP that the LAN range does not cover.
# Confirm before enabling: fail a login from a LAN browser via the public URL
# and look at what `ip=` actually says.
#
# The fix is to ignore the WAN address too. Hard-coding it breaks on every
# dynamic-IP change, so give fail2ban the DynDNS hostname instead — it accepts
# DNS names and re-resolves them:
#
#   ignoreip = 127.0.0.1/8 ::1 <your-lan-cidr> <your-dyndns-host>
#
# Costs a DNS lookup per check, and leaves a short window after an IP change
# where the house is bannable again — both far cheaper than the alternative.
